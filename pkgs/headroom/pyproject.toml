# uv workspace that pins the Headroom proxy and its full transitive closure in
# uv.lock, so uv2nix (see ../../flake.nix + default.nix) can build a fully
# reproducible virtualenv from prebuilt PyPI wheels — no torch, no local Rust
# build. We only ever run `headroom proxy`, so we take the [proxy] extra (ONNX
# INT8 text compression + SmartCrusher), never the heavy [ml] (torch) extra.
#
# Regenerate the lock after bumping the version:
#   nix run nixpkgs#uv -- lock --directory pkgs/headroom
[project]
name = "headroom-env"
version = "0.0.0"
requires-python = ">=3.12,<3.13"
dependencies = [
    "headroom-ai[proxy]==0.30.0",
]

[tool.uv]
# Wheels only: every dep in the [proxy] closure ships a manylinux/macos wheel,
# so we never need a compiler or the Rust/maturin toolchain in the nix build.
no-build = true
